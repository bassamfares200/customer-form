<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{



display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

padding:20px;

}

.card{

background:#fff;

width:100%;
max-width:650px;

border-radius:20px;

padding:35px;

box-shadow:0 20px 50px rgba(0,0,0,.25);

}



.logo{

text-align:center;
font-size:60px;

}





.form-area{

    position:relative;

    padding:20px;

    border-radius:18px;

    overflow:hidden;

}

.form-area::before{

    content:"";

    position:absolute;

    inset:0;

    background-image:var(--card-logo);

    background-repeat:no-repeat;

    background-position:center;

    background-size:90%;

    opacity:.09;

    pointer-events:none;

    z-index:0;

}

.form-area>*{

    position:relative;

    z-index:1;

}






h1{

text-align:center;

margin:10px 0;

color:#0f172a;

}

p{

text-align:center;

color:#666;

margin-bottom:30px;

}

label{

display:block;

font-weight:bold;

margin-top:15px;

margin-bottom:8px;

}

input,select{

width:100%;

padding:14px;

border:1px solid #ccc;

border-radius:10px;

font-size:16px;

outline:none;

transition:.3s;

}

input:focus,
select:focus{

border-color:#2563eb;

box-shadow:0 0 5px rgba(37,99,235,.4);

}

button{

margin-top:30px;

width:100%;

padding:16px;

font-size:18px;

font-weight:bold;

border:none;

border-radius:12px;

cursor:pointer;

background:#25D366;

color:white;

transition:.3s;

}

button:hover{

background:#1da851;

transform:scale(1.02);

}

.footer{

margin-top:20px;

text-align:center;

font-size:14px;

color:#888;

}






#successPage{
    display:none;
    position:fixed;
    inset:0;
    background:#f5f7fb;
    z-index:9999;

    overflow-y:auto;

    padding:40px 20px;

    justify-content:center;
    align-items:flex-start; /* أو center */

    display:none;
}

#successPage.show{
    display:flex;
}

.success-card{

    background:#fff;

    width:95%;
    max-width:750px;

    min-height:700px;   /* يطول حسب الحاجة */
    height:auto;

    border-radius:30px;

    padding:40px;

    box-shadow:0 20px 50px rgba(0,0,0,.25);

    text-align:center;

    display:flex;
    flex-direction:column;
    align-items:center;

    overflow:visible;

    
}

.success-logo{

    width:140px;

    margin-bottom:20px;

    justify-content:center;

}

.success-check{

    width:90px;

    height:90px;

    margin:auto;

    border-radius:50%;

    background:#25D366;

    color:white;

    font-size:60px;

    line-height:90px;

    margin-bottom:20px;

}

.success-card h2{

    color:#25D366;

}

.success-card p{

    font-size:18px;
    line-height:1.8;

}




.action-buttons{

    display:flex;
    justify-content:center;
    align-items:center;
    gap:18px;
    margin-top:35px;
    flex-wrap:wrap;

}

/* التصميم الأساسي */
.action-buttons button{

    min-width:260px;
    height:58px;
    border:none;
    border-radius:16px;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    transition:all .3s ease;
    box-shadow:0 8px 25px rgba(0,0,0,.15);

}

/* زر واتساب */
.btn-whatsapp{

    background:linear-gradient(135deg,#25D366,#128C7E);
    color:#fff;

}

.btn-whatsapp:hover{

    transform:translateY(-3px);
    box-shadow:0 15px 35px rgba(37,211,102,.45);

}

/* زر إنهاء */
.btn-finish{

    background:#fff;
    color:#444;
    border:2px solid #ddd;

}

.btn-finish:hover{

    background:#f5f5f5;
    border-color:#25D366;
    color:#25D366;
    transform:translateY(-3px);
    box-shadow:0 15px 35px rgba(0,0,0,.18);

}

/* حجم الأيقونات */
.action-buttons i{

    font-size:22px;

}

/* للهواتف */
@media (max-width:600px){

    .action-buttons{
        flex-direction:column;
    }

    .action-buttons button{
        width:100%;
        min-width:unset;
    }

}



#messagePreview{
    width:100%;
    max-height:400px;
    overflow-y:auto;

    text-align:right;

    padding:2px;

    border:1px solid #ddd;
    border-radius:12px;

    background:#fafafa;

    white-space:pre-wrap;
    word-break:break-word;
}

@keyframes fadeIn{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:none;

}

}




</style>

</head>

<body>

<div class="card">


<div class="logo">
<img id="logoTop" class="logo" alt="HALLA ROLL">
</div>

<script>

document.getElementById("logoTop").src = LOGO_BASE64;

document.documentElement.style.setProperty(
    "--card-logo",
    `url(${LOGO_BASE64})`
);

</script>


<h1>أكاديمية هلا رول</h1>

<p>
نموذج تسجيل البيانات
</p>

<p>
يرجى تعبئة جميع البيانات ثم الضغط على إرسال عبر الواتساب
</p>

<form id="myForm">

<div class="form-area">

	<label>الاسم الرباعي</label>

	<input
	type="text"
	id="fullname"
	required
	autofocus
	oninvalid="this.setCustomValidity('الرجاء إدخال هذا الحقل')"
	oninput="this.setCustomValidity('')"
	>

	<label>تاريخ الميلاد</label>

	<input
	type="date"
	id="birthdate"
	required
	oninvalid="this.setCustomValidity('الرجاء إدخال هذا الحقل')"
	oninput="this.setCustomValidity('')"
	>

	<label>الجنس</label>

	<select
	id="gender"
	required
	oninvalid="this.setCustomValidity('الرجاء إدخال هذا الحقل')"
	oninput="this.setCustomValidity('')"
	>

	<option value="">اختر</option>

	<option>ذكر</option>

	<option>أنثى</option>

	</select>

	<label>الرقم المدني</label>

	<input
	type="text"
	id="civilid"
	maxlength="12"
	inputmode="numeric"
	required
        oninput="validateCivilID(this)"
        oninvalid="validateCivilID(this)"
	>

	<label>رقم الهاتف</label>

	<input
	type="text"
	id="phone"
	maxlength="8"
	inputmode="numeric"
	required
	oninput="validatephone(this)"
        oninvalid="validatephone(this)"
	>

	<label>الجنسية</label>

	<input
	type="text"
	id="nationality"
	required
	oninvalid="this.setCustomValidity('الرجاء إدخال هذا الحقل')"
	oninput="this.setCustomValidity('')"
	>


	<label>التصنيف الرياضي</label>

	<select 
	id="sporttype"
	required
	oninvalid="this.setCustomValidity('الرجاء إدخال هذا الحقل')"
	oninput="this.setCustomValidity('')"
	>

	<option value="">اختر</option>

	<option>هاوي</option>

	<option>لاعب</option>

	</select>

</div>


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<button type="submit">
    <i class="fab fa-whatsapp"></i>
    متابعة الإرسال عبر الواتساب
</button>



</form>

<div class="footer">

شكراً لتعبئة النموذج

</div>

</div>

<script>


document.getElementById("myForm").addEventListener("submit",function(e){

e.preventDefault();

let fullname=document.getElementById("fullname").value;
let birthdate=document.getElementById("birthdate").value;
let gender=document.getElementById("gender").value;
let civilid=document.getElementById("civilid").value;
let phone=document.getElementById("phone").value;
let nationality=document.getElementById("nationality").value;
let sporttype=document.getElementById("sporttype").value;

let message= `السلام عليكم،

تم تعبئة نموذج البيانات:

👤 الاسم: ${fullname}
🎂 تاريخ الميلاد: ${birthdate}
⚧ الجنس: ${gender}
🪪 الرقم المدني: ${civilid}
📞 رقم الهاتف: ${phone}
🌍 الجنسية: ${nationality}
⚽ التصنيف الرياضي: ${sporttype}`;


document.getElementById("messagePreview").textContent = message;


setTimeout(function(){

    document.getElementById("successPage").classList.add("show");

},1000);


document.getElementById("whatsappBtn").onclick=function(){

	let whatsapp="https://wa.me/96599408471?text="+encodeURIComponent(message);
	window.open(whatsapp,"_blank");

        // تنظيف الحقول
        document.getElementById("myForm").reset();

	localStorage.removeItem("fullname");
	localStorage.removeItem("birthdate");
	localStorage.removeItem("gender");
	localStorage.removeItem("civilid");
	localStorage.removeItem("phone");
	localStorage.removeItem("nationality");
	localStorage.removeItem("sporttype");
	document.getElementById("successPage").classList.remove("show");
 	
	window.scrollTo({
        	top: 0,
        	behavior: "smooth"
	    });

        setTimeout(() => {
	    document.getElementById("fullname").focus();
	}, 300);

}


document.getElementById("finishBtn").onclick=function(){

	document.getElementById("myForm").reset();

	localStorage.removeItem("fullname");
	localStorage.removeItem("birthdate");
	localStorage.removeItem("gender");
	localStorage.removeItem("civilid");
	localStorage.removeItem("phone");
	localStorage.removeItem("nationality");
	localStorage.removeItem("sporttype");

	document.getElementById("successPage").classList.remove("show");

	   window.scrollTo({
	        top:0,
	        behavior:"smooth"
	   });

        setTimeout(() => {
	    document.getElementById("fullname").focus();
         }, 300);
}



});



function validateCivilID(input){

    const value = input.value.trim();

    // الحقل فارغ
    if(value === ""){
        input.setCustomValidity("الرجاء إدخال هذا الحقل");
        return;
    }

    // يحتوي على أحرف
    if(!/^\d+$/.test(value)){
        input.setCustomValidity("الرجاء إدخال أرقام فقط");
        return;
    }

    // أقل من 12 رقم
    if(value.length < 12){
        input.setCustomValidity("الرقم المدني ناقص، يجب أن يتكون من 12 رقماً");
        return;
    }

    // أكثر من 12 رقم (احتياطاً)
    if(value.length > 12){
        input.setCustomValidity("الرقم المدني يجب أن يتكون من 12 رقماً فقط");
        return;
    }

    // صحيح
    input.setCustomValidity("");
}




function validatephone(input){

    const value = input.value.trim();

    // الحقل فارغ
    if(value === ""){
        input.setCustomValidity("الرجاء إدخال هذا الحقل");
        return;
    }

    // يحتوي على أحرف
    if(!/^\d+$/.test(value)){
        input.setCustomValidity("الرجاء إدخال أرقام فقط");
        return;
    }

    // أقل من 8 أرقام
    if(value.length < 8){
        input.setCustomValidity("رقم الهاتف ناقص، يجب أن يتكون من 8 أرقام");
        return;
    }

    // أكثر من 8 رقم (احتياطاً)
    if(value.length > 8){
        input.setCustomValidity("رقم الهاتف يجب أن يتكون من 8 أرقام فقط");
        return;
    }

    // صحيح
    input.setCustomValidity("");
}


</script>





<div id="successPage">

    <div class="success-card">

        <img id="logoSuccess" class="success-logo" alt="HALLA ROLL">
        
        <script>
        document.getElementById("logoSuccess").src = LOGO_BASE64;
        </script>
 
        <div class="success-check">✔</div>

        <h2>سيتم إرسال البيانات التالية عبر الواتساب</h2>
        
        <br>

        <div id="messagePreview"></div>

        <p>

	    <br>
            وسيتم متابعة طلبكم...     شكراً لثقتكم بنا 🌹

        </p>

        <div class="action-buttons">

	    <button id="whatsappBtn" class="btn-whatsapp">
        	<i class="fab fa-whatsapp"></i>
	        إرسال البيانات عبر الواتساب
	    </button>

	    <button id="finishBtn" class="btn-finish">
        	<i class="fas fa-check-circle"></i>
        	إنهاء
	    </button>

	</div>

    </div>

</div>


</body>
</html>
